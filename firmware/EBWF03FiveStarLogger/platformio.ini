[platformio]
default_envs = eb_wf03_01

[env:eb_wf03_01]
platform = espressif8266
board = esp12e
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.flash_size = 4MB
board_build.ldscript = eagle.flash.4m2m.ld
build_flags =
  -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
lib_deps =
  knolleary/PubSubClient@^2.8

